server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Serve mirrored markdown source files (public/projects/...) as readable
    # text instead of nginx's default application/octet-stream, which makes
    # browsers force-download the file instead of displaying it.
    location ~* \.md$ {
        default_type text/plain;
        add_header Content-Type "text/plain; charset=utf-8";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
